<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeekTask · 부서 업무 관리</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0d1117;--sf:#161b22;--sf2:#21262d;--sf3:#2d333b;
      --bd:#30363d;--bd2:#444c56;
      --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
      --ac:#58a6ff;--ac-dim:rgba(88,166,255,0.12);
      --r:10px;--rsm:6px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:14px}
    body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;min-height:100vh;line-height:1.5}

    /* Header */
    #hdr{position:sticky;top:0;z-index:100;background:var(--sf);border-bottom:1px solid var(--bd);
      height:56px;display:flex;align-items:center;padding:0 20px;gap:10px}
    .logo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;
      color:var(--tx);display:flex;align-items:center;gap:7px;white-space:nowrap}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
    .input-search{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
      border-radius:var(--rsm);padding:6px 11px;font-size:13px;
      font-family:'Noto Sans KR',sans-serif;width:170px;outline:none;transition:border-color .15s,width .2s}
    .input-search:focus{border-color:var(--ac);width:210px}
    .input-search::placeholder{color:var(--tx3)}
    .sel-hdr{background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);
      border-radius:var(--rsm);padding:6px 10px;font-size:13px;
      font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer;transition:border-color .12s}
    .sel-hdr:hover,.sel-hdr:focus{border-color:var(--ac);color:var(--tx)}
    .sel-hdr option{background:#21262d}
    .btn-primary{background:var(--ac);color:#0d1117;border:none;padding:7px 15px;
      border-radius:var(--rsm);font-size:13px;font-weight:700;
      font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .15s}
    .btn-primary:hover{opacity:.85}

    /* Week Nav */
    #week-nav{background:var(--sf);border-bottom:1px solid var(--bd);
      padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .wn-ctrl{display:flex;align-items:center;gap:7px}
    .btn-week{background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);
      width:28px;height:28px;border-radius:var(--rsm);cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .12s}
    .btn-week:hover{border-color:var(--ac);color:var(--ac)}
    .week-lbl{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;min-width:52px;text-align:center}
    .week-sub{font-size:12px;color:var(--tx3)}
    .btn-today{background:none;border:1px solid var(--bd);color:var(--tx3);
      padding:4px 9px;border-radius:var(--rsm);font-size:12px;
      font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .12s}
    .btn-today:hover{border-color:var(--ac);color:var(--ac)}

    /* Filter Nav */
    #filter-nav{background:var(--sf);border-bottom:1px solid var(--bd);
      padding:0 20px;display:flex;align-items:center;gap:1px;overflow-x:auto}
    #filter-nav::-webkit-scrollbar{display:none}
    .ftab{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);
      padding:9px 13px;font-size:13px;font-weight:500;
      font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;
      display:flex;align-items:center;gap:5px;transition:all .12s}
    .ftab:hover{color:var(--tx)}
    .ftab.active{color:var(--tx);border-bottom-color:var(--ac)}
    .chip{background:var(--sf2);border-radius:10px;padding:1px 6px;font-size:11px;font-weight:600;color:var(--tx3)}
    .ftab.active .chip{background:var(--ac-dim);color:var(--ac)}

    /* Main */
    #main-area{padding:18px 20px;max-width:1440px;margin:0 auto}

    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
    .stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px}
    .stat-label{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
    .stat-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;line-height:1}
    .stat-sub{font-size:12px;font-weight:600;color:#e6edf3;margin-top:5px}

    /* Kanban */
    .kanban{display:grid;grid-template-columns:repeat(4,minmax(200px,1fr));gap:12px;align-items:start}
    .kol{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);
      min-height:180px;display:flex;flex-direction:column;transition:border-color .15s,background .15s}
    .kol.drag-over{border-color:var(--ac);background:rgba(88,166,255,0.04)}
    .kol-hdr{padding:11px 14px;border-bottom:1px solid var(--bd);
      display:flex;align-items:center;gap:7px;
      background:var(--sf);border-radius:var(--r) var(--r) 0 0}
    .kol-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .kol-name{font-weight:700;font-size:13px}
    .kol-cnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--tx3)}
    .kol-body{padding:9px;display:flex;flex-direction:column;gap:7px;flex:1}
    .kol-empty{text-align:center;padding:20px 10px;color:var(--tx3);font-size:12px;
      border:1.5px dashed var(--bd);border-radius:var(--rsm)}

    /* Task card kanban */
    .tcard{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rsm);
      padding:10px 12px;cursor:grab;
      transition:border-color .12s,transform .1s,opacity .1s;animation:fadeIn .18s ease}
    .tcard:hover{border-color:var(--bd2)}
    .tcard.dragging{opacity:.45;cursor:grabbing;transform:rotate(1.5deg) scale(1.02)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

    /* Task card list */
    .tcard-list{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);
      padding:14px 18px;animation:fadeIn .18s ease;transition:border-color .12s}
    .tcard-list:hover{border-color:var(--bd2)}
    .tcard-list-inner{display:flex;align-items:flex-start;gap:10px}
    .status-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0}

    .tc-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:7px;line-height:1.4;word-break:break-word}
    .tc-title.done-text{text-decoration:line-through;color:var(--tx3)}
    .tc-title-lg{font-size:14px}
    .tc-meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
    .tc-desc{font-size:11px;color:var(--tx3);line-height:1.6;margin-top:5px;white-space:pre-wrap;word-break:break-word}

    .tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
    .tag-waiting {background:rgba(110,118,129,.15);color:#8b949e}
    .tag-progress{background:rgba(88,166,255,.12); color:#58a6ff}
    .tag-done    {background:rgba(63,185,80,.12);  color:#3fb950}
    .tag-hold    {background:rgba(210,153,34,.12); color:#d29922}
    .tag-low     {background:rgba(110,118,129,.1); color:#6e7681}
    .tag-normal  {background:rgba(137,87,229,.1);  color:#a371f7}
    .tag-high    {background:rgba(210,153,34,.1);  color:#d29922}
    .tag-urgent  {background:rgba(248,81,73,.1);   color:#f85149}
    .tag-person  {background:var(--sf3);color:var(--tx2)}
    .tag-carried {background:rgba(88,166,255,.12);color:#79c0ff;font-size:10px}
    .tag-no-assignee{background:rgba(248,81,73,.08);color:#f85149;font-size:10px}

    .tc-actions{display:flex;gap:3px;margin-top:8px;justify-content:flex-end;opacity:0;transition:opacity .12s}
    .tcard:hover .tc-actions,.tcard-list:hover .tc-actions{opacity:1}
    .btn-ic{background:var(--sf3);border:none;color:var(--tx3);
      width:24px;height:24px;border-radius:4px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s}
    .btn-ic:hover{color:var(--tx);background:var(--bd2)}
    .btn-ic.del:hover{color:#f85149}

    .list-view{display:flex;flex-direction:column;gap:8px}
    .drag-hint{font-size:11px;color:var(--tx3);text-align:center;padding:4px 0 10px;letter-spacing:.3px}

    .empty{text-align:center;padding:48px 20px;color:var(--tx3)}
    .empty-icon{font-size:38px;margin-bottom:12px}
    .empty-title{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:5px}
    .empty-sub{font-size:13px}

    /* Modal */
    .overlay{position:fixed;inset:0;z-index:200;background:rgba(1,4,9,.75);backdrop-filter:blur(4px);
      display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeOvr .15s ease}
    @keyframes fadeOvr{from{opacity:0}to{opacity:1}}
    .modal{background:var(--sf);border:1px solid var(--bd);border-radius:14px;
      width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .18s ease}
    @keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--bd);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .modal-title{font-size:14px;font-weight:700}
    .btn-close{background:none;border:none;color:var(--tx3);font-size:20px;cursor:pointer;padding:2px 5px;border-radius:4px;transition:color .12s}
    .btn-close:hover{color:var(--tx)}
    .modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:13px;overflow-y:auto}
    .form-group{display:flex;flex-direction:column;gap:4px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px}
    .field{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
      border-radius:var(--rsm);padding:8px 11px;font-size:13px;
      font-family:'Noto Sans KR',sans-serif;width:100%;outline:none;transition:border-color .12s}
    .field:focus{border-color:var(--ac)}
    .field::placeholder{color:var(--tx3)}
    .field.error{border-color:#f85149}
    select.field option{background:#21262d}
    textarea.field{resize:vertical;min-height:72px;line-height:1.6}
    .modal-ftr{padding:12px 20px 16px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:7px;flex-shrink:0}
    .btn-cancel{background:none;border:1px solid var(--bd);color:var(--tx2);
      padding:7px 14px;border-radius:var(--rsm);font-size:13px;
      font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .12s}
    .btn-cancel:hover{border-color:var(--bd2);color:var(--tx)}

    /* Assignee popup */
    .ap-modal{background:var(--sf);border:1px solid #f85149;border-radius:14px;
      width:100%;max-width:360px;display:flex;flex-direction:column;animation:slideUp .18s ease}
    .ap-body{padding:20px;display:flex;flex-direction:column;gap:14px}
    .ap-warn{font-size:13px;color:var(--tx2);line-height:1.7}
    .ap-warn strong{color:#f85149}
    .ap-ftr{padding:0 20px 18px;display:flex;justify-content:flex-end;gap:7px}

    /* Loading / Toast */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--tx3);gap:13px}
    .spinner{width:28px;height:28px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:18px;right:18px;z-index:999;background:var(--sf2);
      border:1px solid var(--bd2);border-radius:var(--r);padding:10px 16px;font-size:13px;
      display:flex;align-items:center;gap:7px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toastIn .18s ease}
    @keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

    @media(max-width:900px){.kanban{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){
      #hdr{padding:0 12px;gap:6px}
      .logo span{display:none}
      .input-search{width:120px}.input-search:focus{width:140px}
      .kanban{grid-template-columns:1fr}
      .stats{grid-template-columns:1fr 1fr}
      #main-area{padding:12px}
      .form-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div id="app">
  <header id="hdr"></header>
  <div id="week-nav"></div>
  <nav id="filter-nav"></nav>
  <div id="main-area">
    <div class="loading"><div class="spinner"></div><span>로딩 중…</span></div>
  </div>
</div>

<script>
/* ══ Firebase ══ */
const firebaseConfig = {
  apiKey:            "AIzaSyBLjLVOVkNbAQcd3ZAMUepH6r7H0nf6-_A",
  authDomain:        "financial-planning-group.firebaseapp.com",
  databaseURL:       "https://financial-planning-group-default-rtdb.firebaseio.com",
  projectId:         "financial-planning-group",
  storageBucket:     "financial-planning-group.appspot.com",
  messagingSenderId: "653273935773",
  appId:             "1:653273935773:web:d71da1ca776af3bf76c974"
};

const ASSIGNEES = ["홍혜란","정수지","박사준","이승환","이현용","이다원"];

const STATUS = {
  waiting:  {label:'대기중',color:'#8b949e',tagClass:'tag-waiting', dot:'#8b949e'},
  progress: {label:'진행중',color:'#58a6ff',tagClass:'tag-progress',dot:'#58a6ff'},
  done:     {label:'완료',  color:'#3fb950',tagClass:'tag-done',    dot:'#3fb950'},
  hold:     {label:'보류',  color:'#d29922',tagClass:'tag-hold',    dot:'#d29922'},
};
const PRIORITY = {
  low:    {label:'낮음',tagClass:'tag-low'},
  normal: {label:'보통',tagClass:'tag-normal'},
  high:   {label:'높음',tagClass:'tag-high'},
  urgent: {label:'긴급',tagClass:'tag-urgent'},
};

/* ══ State ══ */
let db=null, tasks={};
let currentWeek, currentYear;
let filterStatus='all', filterAssignee='all', searchQuery='';
let editingId=null, dragTaskId=null;

/* ══ Utils ══ */
function getWeekNum(d){
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));
  const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-ys)/86400000)+1)/7);
}
function weekLabel(w){return 'W'+String(w).padStart(2,'0')}
function nextWeekLabel(wl){
  const n=parseInt(wl.replace('W',''));
  return weekLabel(n>=52?1:n+1);
}
function getWeekRange(w,y){
  const s=new Date(y,0,1+(w-1)*7),dow=s.getDay();
  const mon=new Date(s);mon.setDate(s.getDate()-(dow<=4?dow-1:dow-8));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const f=d=>`${d.getMonth()+1}/${d.getDate()}`;
  return `${f(mon)} – ${f(sun)}`;
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,icon='✓'){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');
  el.className='toast';el.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2800);
}

/* ══════════════════════════════════════════════
   보류 ↔ 차주 대기중 연동 로직
   ─ holdId: 보류 task의 Firebase key
   ─ task.carriedTo  : 보류→차주 생성된 task의 key
   ─ task.carriedFrom: 차주 task가 원본 보류 task의 key를 가짐
══════════════════════════════════════════════ */

/* 보류 → 차주 대기중 생성 */
async function createLinkedTask(holdId){
  const t=tasks[holdId];
  if(!t||t.carriedTo) return; /* 이미 연결된 경우 스킵 */
  const nwl=nextWeekLabel(t.week||weekLabel(currentWeek));
  const newRef=db.ref('tasks').push();
  const newId=newRef.key;
  await newRef.set({
    title:       t.title,
    department:  t.department||'',
    assignee:    t.assignee||'',
    week:        nwl,
    priority:    t.priority||'normal',
    status:      'waiting',
    description: t.description||'',
    carriedFrom: holdId,        /* ← 차주 task가 원본 ID 저장 */
    createdAt:   Date.now(),
    updatedAt:   Date.now(),
  });
  /* 원본 보류 task에 차주 task ID 기록 */
  await db.ref(`tasks/${holdId}`).update({carriedTo:newId,updatedAt:Date.now()});
  toast('차주 대기중으로 자동 이월됐습니다','🔁');
}

/* 보류 task에 연결된 차주 task 삭제 */
async function removeLinkedTask(holdId){
  const t=tasks[holdId];
  if(!t||!t.carriedTo) return;
  await db.ref(`tasks/${t.carriedTo}`).remove();
  await db.ref(`tasks/${holdId}`).update({carriedTo:null,updatedAt:Date.now()});
}

/* ══ setStatus: 핵심 상태 변경 함수 ══ */
async function setStatus(id, newStatus){
  const oldStatus=tasks[id]?.status;
  if(oldStatus===newStatus) return;

  /* 1) Firebase 상태 업데이트 */
  await db.ref(`tasks/${id}`).update({status:newStatus,updatedAt:Date.now()});

  /* 2) 보류로 변경 → 차주 대기중 생성 */
  if(newStatus==='hold'){
    await createLinkedTask(id);
  }

  /* 3) 보류에서 다른 상태로 변경 → 연결된 차주 task 삭제 */
  if(oldStatus==='hold' && newStatus!=='hold'){
    await removeLinkedTask(id);
  }
}

/* ══ removeTask: 삭제 시 양방향 동기화 ══ */
async function removeTask(id){
  if(!confirm('이 업무를 삭제하시겠습니까?')) return;
  const t=tasks[id];
  if(!t) return;

  try{
    /* Case A: 보류 task 삭제 → 연결된 차주 대기중도 삭제 */
    if(t.status==='hold' && t.carriedTo){
      await db.ref(`tasks/${t.carriedTo}`).remove();
      toast('보류 삭제 + 차주 이월 업무도 함께 삭제됐습니다','🗑');
    }
    /* Case B: 이월된 대기중 task 삭제 → 원본 보류 task도 삭제 */
    else if(t.carriedFrom && tasks[t.carriedFrom]){
      await db.ref(`tasks/${t.carriedFrom}`).remove();
      toast('이월 업무 삭제 + 원본 보류 업무도 함께 삭제됐습니다','🗑');
    } else {
      toast('삭제됐습니다','🗑');
    }
    /* 본체 삭제 */
    await db.ref(`tasks/${id}`).remove();
  }catch(e){toast('삭제 오류: '+e.message,'⚠️');}
}

/* ══ Drag & Drop ══ */
function onDragStart(e,id){
  dragTaskId=id;e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.getElementById(`tc-${id}`);if(el)el.classList.add('dragging');},0);
}
function onDragEnd(){document.querySelectorAll('.tcard.dragging').forEach(el=>el.classList.remove('dragging'));}
function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
async function onDrop(e,status){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!dragTaskId){return;}
  const t=tasks[dragTaskId];
  if(!t||t.status===status){dragTaskId=null;return;}
  /* 진행중/완료: 담당자 필수 */
  if((status==='progress'||status==='done')&&!t.assignee){
    openAssigneePopup(dragTaskId,status);
  } else {
    await setStatus(dragTaskId,status);
    if(status!=='hold') toast(`"${STATUS[status].label}"로 변경됐습니다`,'✅');
  }
  dragTaskId=null;
}

/* ══ 담당자 팝업 ══ */
function openAssigneePopup(taskId,targetStatus){
  document.getElementById('modal-overlay')?.remove();
  const overlay=document.createElement('div');
  overlay.className='overlay';overlay.id='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  overlay.innerHTML=`
    <div class="ap-modal" role="dialog">
      <div class="modal-hdr">
        <div class="modal-title">⚠️ 담당자 지정 필요</div>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
      <div class="ap-body">
        <div class="ap-warn">
          <strong>"${STATUS[targetStatus].label}"</strong> 상태로 변경하려면<br>
          담당자를 먼저 지정해야 합니다.
        </div>
        <div class="form-group">
          <label for="ap-person">담당자 선택</label>
          <select class="field" id="ap-person">
            <option value="">담당자를 선택하세요</option>
            ${ASSIGNEES.map(a=>`<option value="${esc(a)}">${esc(a)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="ap-ftr">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="confirmAssigneeAndStatus('${taskId}','${targetStatus}')">확인 후 변경</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('ap-person')?.focus(),50);
}
async function confirmAssigneeAndStatus(taskId,targetStatus){
  const assignee=document.getElementById('ap-person').value;
  if(!assignee){document.getElementById('ap-person').classList.add('error');toast('담당자를 선택해주세요','⚠️');return;}
  try{
    await db.ref(`tasks/${taskId}`).update({assignee,updatedAt:Date.now()});
    /* tasks 메모리 즉시 반영 */
    if(tasks[taskId]) tasks[taskId].assignee=assignee;
    await setStatus(taskId,targetStatus);
    toast(`담당자 지정 후 "${STATUS[targetStatus].label}"로 변경됐습니다`,'✅');
    closeModal();
  }catch(err){toast('오류: '+err.message,'⚠️');}
}

/* ══ Modal ══ */
function openModal(id=null){
  editingId=id;
  const t=id?(tasks[id]||{}):{};
  const wl=weekLabel(currentWeek);
  const overlay=document.createElement('div');
  overlay.className='overlay';overlay.id='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  overlay.innerHTML=`
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-hdr">
        <div class="modal-title">${id?'✏️ 업무 수정':'➕ 업무 추가'}</div>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="f-title">업무명 *</label>
          <input class="field" id="f-title" type="text" placeholder="업무 내용을 입력하세요" value="${esc(t.title||'')}" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-dept">부서</label>
            <input class="field" id="f-dept" type="text" placeholder="예: 기획팀" value="${esc(t.department||'')}" />
          </div>
          <div class="form-group">
            <label for="f-person">담당자</label>
            <select class="field" id="f-person">
              <option value="">담당자 선택 (선택사항)</option>
              ${ASSIGNEES.map(a=>`<option value="${esc(a)}" ${(t.assignee||'')===a?'selected':''}>${esc(a)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-week">주차</label>
            <input class="field" id="f-week" type="text" placeholder="예: W22" value="${esc(t.week||wl)}" />
          </div>
          <div class="form-group">
            <label for="f-priority">우선순위</label>
            <select class="field" id="f-priority">
              ${Object.entries(PRIORITY).map(([k,v])=>`<option value="${k}" ${(t.priority||'normal')===k?'selected':''}>${v.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="f-status">상태</label>
          <select class="field" id="f-status">
            ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${(t.status||'waiting')===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label for="f-desc">설명</label>
          <textarea class="field" id="f-desc" placeholder="업무 상세 내용, 참고사항 등">${esc(t.description||'')}</textarea>
        </div>
      </div>
      <div class="modal-ftr">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="saveTask()">저장</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('f-title')?.focus(),50);
}
function closeModal(){document.getElementById('modal-overlay')?.remove();editingId=null;}

/* ══ saveTask ══ */
async function saveTask(){
  const titleEl=document.getElementById('f-title');
  const title=titleEl.value.trim();
  if(!title){titleEl.classList.add('error');titleEl.focus();return;}
  const newStatus =document.getElementById('f-status').value;
  const assignee  =document.getElementById('f-person').value;
  if((newStatus==='progress'||newStatus==='done')&&!assignee){
    document.getElementById('f-person').classList.add('error');
    toast('진행중·완료 상태는 담당자를 지정해야 합니다','⚠️');return;
  }
  const weekVal=(document.getElementById('f-week').value.trim()||weekLabel(currentWeek)).toUpperCase();
  const data={title,department:document.getElementById('f-dept').value.trim(),
    assignee,week:weekVal,priority:document.getElementById('f-priority').value,
    status:newStatus,description:document.getElementById('f-desc').value.trim(),updatedAt:Date.now()};
  try{
    if(editingId){
      const oldStatus=tasks[editingId]?.status;
      await db.ref(`tasks/${editingId}`).update(data);
      /* 상태 변경에 따른 연동 처리 */
      if(newStatus==='hold' && oldStatus!=='hold'){
        /* tasks 메모리 즉시 반영 후 연동 생성 */
        tasks[editingId]={...tasks[editingId],...data};
        await createLinkedTask(editingId);
      } else if(oldStatus==='hold' && newStatus!=='hold'){
        tasks[editingId]={...tasks[editingId],...data};
        await removeLinkedTask(editingId);
      }
      toast('업무가 수정됐습니다','✏️');
    } else {
      data.createdAt=Date.now();
      const newRef=await db.ref('tasks').push(data);
      /* 신규 등록 시 바로 보류면 차주 생성 */
      if(newStatus==='hold'){
        tasks[newRef.key]=data;
        await createLinkedTask(newRef.key);
      }
      toast('업무가 추가됐습니다','✅');
    }
    closeModal();
  }catch(e){toast('저장 오류: '+e.message,'⚠️');}
}

/* ══ Render: Header (딱 한 번) ══ */
function renderHeader(){
  document.getElementById('hdr').innerHTML=`
    <div class="logo"><div class="logo-dot"></div><span>WeekTask</span></div>
    <div class="hdr-right">
      <input class="input-search" id="search-input" type="text"
        placeholder="🔍 업무 검색" oninput="onSearch(this.value)" />
      <select class="sel-hdr" onchange="setAssigneeFilter(this.value)">
        <option value="all">전체 담당자</option>
        ${ASSIGNEES.map(a=>`<option value="${esc(a)}">${esc(a)}</option>`).join('')}
      </select>
      <button class="btn-primary" onclick="openModal()">+ 업무 추가</button>
    </div>`;
}

/* ══ Render Week Nav ══ */
function renderWeekNav(){
  const wl=weekLabel(currentWeek),range=getWeekRange(currentWeek,currentYear);
  const isNow=currentWeek===getWeekNum(new Date())&&currentYear===new Date().getFullYear();
  document.getElementById('week-nav').innerHTML=`
    <div class="wn-ctrl">
      <button class="btn-week" onclick="shiftWeek(-1)">‹</button>
      <div><div class="week-lbl">${wl}</div><div class="week-sub">${currentYear}년 · ${range}</div></div>
      <button class="btn-week" onclick="shiftWeek(1)">›</button>
    </div>
    ${!isNow?`<button class="btn-today" onclick="goNow()">이번 주로</button>`:''}`;
}

/* ══ Render Filter Nav ══ */
function renderFilterNav(){
  const wl=weekLabel(currentWeek);
  const wt=Object.values(tasks).filter(t=>t.week===wl);
  const c={all:wt.length,
    waiting: wt.filter(t=>t.status==='waiting').length,
    progress:wt.filter(t=>t.status==='progress').length,
    done:    wt.filter(t=>t.status==='done').length,
    hold:    wt.filter(t=>t.status==='hold').length};
  const tabs=[['all','전체'],['waiting','대기중'],['progress','진행중'],['done','완료'],['hold','보류']];
  document.getElementById('filter-nav').innerHTML=tabs.map(([k,l])=>`
    <button class="ftab ${filterStatus===k?'active':''}" onclick="setFilter('${k}')">
      ${l}<span class="chip">${c[k]}</span>
    </button>`).join('');
}

/* ══ Render Main ══ */
function renderMain(){
  const wl=weekLabel(currentWeek);
  const allWeek=Object.entries(tasks).filter(([,t])=>t.week===wl);
  let filtered=allWeek;
  if(filterAssignee!=='all') filtered=filtered.filter(([,t])=>t.assignee===filterAssignee);
  if(searchQuery) filtered=filtered.filter(([,t])=>(t.title||'').toLowerCase().includes(searchQuery.toLowerCase()));

  /* Stats */
  const total  =allWeek.length;
  const waiting=allWeek.filter(([,t])=>t.status==='waiting').length;
  const prog   =allWeek.filter(([,t])=>t.status==='progress').length;
  const done   =allWeek.filter(([,t])=>t.status==='done').length;
  const rate   =total?Math.round(done/total*100):0;
  const rateColor=rate>=80?'#3fb950':rate>=40?'#d29922':'#e6edf3';

  const statsHtml=`
    <div class="stats">
      <div class="stat">
        <div class="stat-label">대기중</div>
        <div class="stat-val" style="color:#8b949e">${waiting}</div>
      </div>
      <div class="stat">
        <div class="stat-label">진행중</div>
        <div class="stat-val" style="color:#58a6ff">${prog}</div>
      </div>
      <div class="stat">
        <div class="stat-label">완료</div>
        <div class="stat-val" style="color:#3fb950">${done}</div>
      </div>
      <div class="stat">
        <div class="stat-label">전체 업무</div>
        <div class="stat-val" style="color:#e6edf3">${total}</div>
        <div class="stat-sub" style="color:${rateColor}">완료율 ${rate}%</div>
      </div>
    </div>`;

  let boardHtml='';
  if(filterStatus==='all'){
    boardHtml=`<div class="drag-hint">💡 카드를 드래그하여 다른 칸으로 옮기면 상태가 변경됩니다</div><div class="kanban">`;
    for(const [sk,sv] of Object.entries(STATUS)){
      const col=filtered.filter(([,t])=>t.status===sk).sort(([,a],[,b])=>(b.createdAt||0)-(a.createdAt||0));
      boardHtml+=`
        <div class="kol" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${sk}')">
          <div class="kol-hdr">
            <div class="kol-dot" style="background:${sv.dot}"></div>
            <div class="kol-name">${sv.label}</div>
            <div class="kol-cnt">${col.length}</div>
          </div>
          <div class="kol-body">
            ${col.length===0
              ?`<div class="kol-empty">여기로 드래그하세요</div>`
              :col.map(([id,t])=>cardKanban(id,t)).join('')}
          </div>
        </div>`;
    }
    boardHtml+=`</div>`;
  } else {
    const items=filtered.filter(([,t])=>t.status===filterStatus).sort(([,a],[,b])=>(b.createdAt||0)-(a.createdAt||0));
    boardHtml=items.length===0
      ?`<div class="empty"><div class="empty-icon">📋</div>
         <div class="empty-title">${wl} · ${STATUS[filterStatus]?.label} 업무가 없습니다</div>
         <div class="empty-sub">+ 업무 추가 버튼으로 등록해보세요</div></div>`
      :`<div class="list-view">${items.map(([id,t])=>cardList(id,t)).join('')}</div>`;
  }
  document.getElementById('main-area').innerHTML=statsHtml+boardHtml;
}

function renderAll(){renderWeekNav();renderFilterNav();renderMain();}

/* ══ Cards ══ */
function cardKanban(id,t){
  const pr=PRIORITY[t.priority]||PRIORITY.normal;
  return `
    <div class="tcard" id="tc-${id}" draggable="true"
      ondragstart="onDragStart(event,'${id}')" ondragend="onDragEnd(event)">
      <div class="tc-title ${t.status==='done'?'done-text':''}">${esc(t.title)}</div>
      <div class="tc-meta">
        <span class="tag ${pr.tagClass}">${pr.label}</span>
        ${t.assignee
          ?`<span class="tag tag-person">👤 ${esc(t.assignee)}</span>`
          :`<span class="tag tag-no-assignee">⚠ 담당자 없음</span>`}
        ${t.carriedFrom?`<span class="tag tag-carried">↩ 이월</span>`:''}
        ${t.carriedTo  ?`<span class="tag tag-carried">🔁 이월됨</span>`:''}
      </div>
      ${t.description?`<div class="tc-desc">${esc(t.description)}</div>`:''}
      <div class="tc-actions">
        <button class="btn-ic" onclick="openModal('${id}')">✏️</button>
        <button class="btn-ic del" onclick="removeTask('${id}')">🗑</button>
      </div>
    </div>`;
}
function cardList(id,t){
  const st=STATUS[t.status]||STATUS.waiting;
  const pr=PRIORITY[t.priority]||PRIORITY.normal;
  return `
    <div class="tcard-list" id="tc-${id}">
      <div class="tcard-list-inner">
        <div class="status-bar" style="background:${st.color}"></div>
        <div style="flex:1;min-width:0">
          <div class="tc-title tc-title-lg ${t.status==='done'?'done-text':''}">${esc(t.title)}</div>
          <div class="tc-meta">
            <span class="tag ${st.tagClass}">${st.label}</span>
            <span class="tag ${pr.tagClass}">${pr.label}</span>
            ${t.assignee
              ?`<span class="tag tag-person">👤 ${esc(t.assignee)}</span>`
              :`<span class="tag tag-no-assignee">⚠ 담당자 없음</span>`}
            ${t.carriedFrom?`<span class="tag tag-carried">↩ 이월</span>`:''}
            ${t.carriedTo  ?`<span class="tag tag-carried">🔁 이월됨</span>`:''}
          </div>
          ${t.description?`<div class="tc-desc">${esc(t.description)}</div>`:''}
        </div>
        <div class="tc-actions" style="opacity:1;flex-shrink:0">
          <button class="btn-ic" onclick="openModal('${id}')">✏️</button>
          <button class="btn-ic del" onclick="removeTask('${id}')">🗑</button>
        </div>
      </div>
    </div>`;
}

/* ══ Navigation ══ */
function shiftWeek(d){
  currentWeek+=d;
  if(currentWeek<1){currentWeek=52;currentYear--;}
  if(currentWeek>52){currentWeek=1;currentYear++;}
  renderAll();
}
function goNow(){const n=new Date();currentWeek=getWeekNum(n);currentYear=n.getFullYear();renderAll();}
function setFilter(s){filterStatus=s;renderFilterNav();renderMain();}
function setAssigneeFilter(v){filterAssignee=v;renderMain();}
function onSearch(val){searchQuery=val;renderMain();}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter'&&e.ctrlKey&&document.getElementById('modal-overlay')) saveTask();
});

/* ══ Init ══ */
(function init(){
  const now=new Date();
  currentWeek=getWeekNum(now);currentYear=now.getFullYear();
  renderHeader();
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.database();
    db.ref('tasks').on('value',snap=>{
      tasks=snap.val()||{};
      renderAll();
    },err=>{
      document.getElementById('main-area').innerHTML=`
        <div class="loading" style="color:#f85149">
          <span style="font-size:36px">⚠️</span>
          <span>Firebase 오류: ${esc(err.message)}</span>
        </div>`;
    });
  }catch(e){
    document.getElementById('main-area').innerHTML=`
      <div class="loading" style="color:#f85149">
        <span style="font-size:36px">⚠️</span><span>${esc(e.message)}</span>
      </div>`;
  }
})();
</script>
</body>
</html>
