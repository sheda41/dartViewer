<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeekTask · 부서 업무 관리</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── Design Tokens ─── */
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #21262d;
      --surface3:   #2d333b;
      --border:     #30363d;
      --border2:    #444c56;
      --text:       #e6edf3;
      --text2:      #8b949e;
      --text3:      #6e7681;
      --accent:     #58a6ff;
      --accent-dim: rgba(88,166,255,0.12);

      --s-waiting: #6e7681;
      --s-progress: #58a6ff;
      --s-done:    #3fb950;
      --s-hold:    #d29922;

      --p-low:    #6e7681;
      --p-normal: #8957e5;
      --p-high:   #d29922;
      --p-urgent: #f85149;

      --radius: 10px;
      --radius-sm: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Header ─── */
    .hdr {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex; align-items: center;
      padding: 0 24px;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 17px; font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      user-select: none;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .hdr-right { display: flex; align-items: center; gap: 8px; }

    .input-search {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      width: 180px;
      outline: none;
      transition: border-color 0.15s, width 0.2s;
    }
    .input-search:focus { border-color: var(--accent); width: 220px; }
    .input-search::placeholder { color: var(--text3); }

    .btn-primary {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }

    /* ─── Week Nav ─── */
    .week-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }

    .wn-controls { display: flex; align-items: center; gap: 8px; }

    .btn-week {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all 0.12s;
    }
    .btn-week:hover { border-color: var(--accent); color: var(--accent); }

    .week-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px; font-weight: 700;
      color: var(--text);
      min-width: 56px; text-align: center;
    }

    .week-sub {
      font-size: 12px; color: var(--text3);
    }

    .btn-today {
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-today:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── Filters ─── */
    .filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; gap: 2px;
      overflow-x: auto;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text2);
      padding: 10px 14px;
      font-size: 13px; font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.12s;
    }
    .filter-tab:hover { color: var(--text); }
    .filter-tab.active { color: var(--text); border-bottom-color: var(--accent); }

    .chip {
      background: var(--surface2);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px; font-weight: 600;
      color: var(--text3);
    }
    .filter-tab.active .chip { background: var(--accent-dim); color: var(--accent); }

    /* ─── Main ─── */
    .main {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ─── Stats ─── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 11px; font-weight: 600;
      color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 26px; font-weight: 700;
      line-height: 1;
    }

    /* ─── Task list ─── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex; align-items: flex-start; gap: 12px;
      transition: border-color 0.12s;
      animation: fadeIn 0.18s ease;
      position: relative;
    }
    .task-card:hover { border-color: var(--border2); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .status-bar {
      width: 3px; border-radius: 2px;
      align-self: stretch; flex-shrink: 0;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 14px; font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      word-break: break-word;
      line-height: 1.4;
    }
    .task-title.done-text {
      text-decoration: line-through;
      color: var(--text3);
    }

    .task-meta {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; margin-bottom: 4px;
    }

    .tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }

    /* status tags */
    .tag-waiting  { background: rgba(110,118,129,0.15); color: #8b949e; }
    .tag-progress { background: rgba(88,166,255,0.12);  color: #58a6ff; }
    .tag-done     { background: rgba(63,185,80,0.12);   color: #3fb950; }
    .tag-hold     { background: rgba(210,153,34,0.12);  color: #d29922; }

    /* priority tags */
    .tag-low    { background: rgba(110,118,129,0.1); color: #6e7681; }
    .tag-normal { background: rgba(137,87,229,0.1);  color: #a371f7; }
    .tag-high   { background: rgba(210,153,34,0.1);  color: #d29922; }
    .tag-urgent { background: rgba(248,81,73,0.1);   color: #f85149; }

    .tag-dept    { background: rgba(88,166,255,0.08); color: #79c0ff; }
    .tag-person  { background: var(--surface2); color: var(--text2); }

    .task-desc {
      font-size: 12px; color: var(--text3);
      line-height: 1.6; margin-top: 6px;
      white-space: pre-wrap; word-break: break-word;
    }

    /* Quick status */
    .quick-status {
      display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap;
    }
    .qs-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text3);
      padding: 2px 8px; border-radius: var(--radius-sm);
      font-size: 11px; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.12s;
    }
    .qs-btn:hover { border-color: var(--border2); color: var(--text); }
    .qs-btn.qs-waiting.on  { background: rgba(110,118,129,0.25); color: #c9d1d9; border-color: transparent; }
    .qs-btn.qs-progress.on { background: rgba(88,166,255,0.2);   color: #58a6ff; border-color: transparent; }
    .qs-btn.qs-done.on     { background: rgba(63,185,80,0.2);    color: #3fb950; border-color: transparent; }
    .qs-btn.qs-hold.on     { background: rgba(210,153,34,0.2);   color: #d29922; border-color: transparent; }

    /* Actions */
    .task-actions {
      display: flex; gap: 4px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.12s;
    }
    .task-card:hover .task-actions { opacity: 1; }

    .btn-icon {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2);
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all 0.12s;
    }
    .btn-icon:hover { border-color: var(--border2); color: var(--text); }
    .btn-icon.del:hover { border-color: rgba(248,81,73,0.5); color: #f85149; }

    /* ─── Empty ─── */
    .empty {
      text-align: center;
      padding: 64px 20px;
      color: var(--text3);
    }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .empty-desc  { font-size: 13px; line-height: 1.7; }

    /* ─── Modal ─── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(1,4,9,0.7);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeOvr 0.15s ease;
    }
    @keyframes fadeOvr { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%; max-width: 540px;
      animation: slideUp 0.18s ease;
      max-height: 90vh;
      display: flex; flex-direction: column;
    }
    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .modal-hdr {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title { font-size: 15px; font-weight: 700; }

    .btn-close {
      background: none; border: none;
      color: var(--text3); font-size: 22px; line-height: 1;
      cursor: pointer; padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.12s;
    }
    .btn-close:hover { color: var(--text); }

    .modal-body {
      padding: 20px 22px;
      display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    label {
      font-size: 11px; font-weight: 700;
      color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.6px;
    }

    .field {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      width: 100%; outline: none;
      transition: border-color 0.12s;
    }
    .field:focus { border-color: var(--accent); }
    .field::placeholder { color: var(--text3); }
    .field.error { border-color: #f85149; }

    select.field option { background: #21262d; }

    textarea.field { resize: vertical; min-height: 80px; line-height: 1.6; }

    .modal-ftr {
      padding: 14px 22px 18px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
      flex-shrink: 0;
    }

    .btn-cancel {
      background: none; border: 1px solid var(--border);
      color: var(--text2);
      padding: 8px 16px; border-radius: var(--radius-sm);
      font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all 0.12s;
    }
    .btn-cancel:hover { border-color: var(--border2); color: var(--text); }

    /* ─── Loading ─── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh;
      color: var(--text3); gap: 14px;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 999;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 11px 18px;
      font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: toastIn 0.18s ease;
    }
    @keyframes toastIn {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* ─── Setup ─── */
    .setup {
      max-width: 700px; margin: 40px auto; padding: 24px;
    }
    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 40px;
    }
    .setup-h { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .setup-desc { color: var(--text2); line-height: 1.8; margin-bottom: 32px; font-size: 13px; }

    .setup-step { margin-bottom: 28px; }
    .step-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700;
      color: var(--accent); letter-spacing: 1px;
      margin-bottom: 5px;
    }
    .step-title { font-weight: 700; margin-bottom: 8px; }
    .step-body { color: var(--text2); font-size: 13px; line-height: 1.8; margin-bottom: 8px; }

    .code-box {
      background: #010409;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #79c0ff;
      white-space: pre;
      overflow-x: auto;
      line-height: 1.9;
    }
    .code-box .cmt { color: #3d444d; }
    .code-box .key { color: #ff7b72; }
    .code-box .val { color: #a5d6ff; }
    .code-box .punc { color: #c9d1d9; }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      .hdr { padding: 0 14px; }
      .week-nav { padding: 10px 14px; }
      .filters { padding: 0 14px; }
      .main { padding: 14px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .input-search { width: 140px; }
      .input-search:focus { width: 160px; }
      .task-actions { opacity: 1; }
      .setup-card { padding: 24px; }
    }

    @media (max-width: 380px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stat-val { font-size: 20px; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>로딩 중…</span>
  </div>
</div>

<script>
/* ================================================================
   ⚙️  FIREBASE 설정  — 아래 값을 본인 Firebase 프로젝트 값으로 교체
   ================================================================ */
const firebaseConfig = {
  apiKey:            "AIzaSyBLjLVOVkNbAQcd3ZAMUepH6r7H0nf6-_A",
  authDomain:        "financial-planning-group.firebaseapp.com",
  databaseURL:       "https://financial-planning-group-default-rtdb.firebaseio.com",
  projectId:         "financial-planning-group",
  storageBucket:     "financial-planning-group.appspot.com",
  messagingSenderId: "653273935773",
  appId:             "1:653273935773:web:d71da1ca776af3bf76c974"
};
/* ================================================================ */

// ── Constants ──
const STATUS = {
  waiting:  { label: '대기중', color: '#6e7681', tagClass: 'tag-waiting',  qsClass: 'qs-waiting'  },
  progress: { label: '진행중', color: '#58a6ff', tagClass: 'tag-progress', qsClass: 'qs-progress' },
  done:     { label: '완료',   color: '#3fb950', tagClass: 'tag-done',     qsClass: 'qs-done'     },
  hold:     { label: '보류',   color: '#d29922', tagClass: 'tag-hold',     qsClass: 'qs-hold'     },
};

const PRIORITY = {
  low:    { label: '낮음', tagClass: 'tag-low'    },
  normal: { label: '보통', tagClass: 'tag-normal' },
  high:   { label: '높음', tagClass: 'tag-high'   },
  urgent: { label: '긴급', tagClass: 'tag-urgent' },
};

// ── State ──
let db = null;
let tasks = {};
let currentWeek = getWeekNum(new Date());
let currentYear = new Date().getFullYear();
let filterStatus = 'all';
let searchQuery   = '';
let editingId     = null;

// ── Utilities ──
function getWeekNum(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function weekLabel(w) {
  return 'W' + String(w).padStart(2, '0');
}

function getWeekRange(week, year) {
  // Find the Monday of that ISO week
  const simple = new Date(year, 0, 1 + (week - 1) * 7);
  const dow = simple.getDay();
  const mon = new Date(simple);
  mon.setDate(simple.getDate() - (dow <= 4 ? dow - 1 : dow - 8));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${fmt(mon)} – ${fmt(sun)}`;
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, icon = '✓') {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ── Render ──
function render() {
  const wl = weekLabel(currentWeek);
  const range = getWeekRange(currentWeek, currentYear);
  const isCurrentWeek = currentWeek === getWeekNum(new Date()) && currentYear === new Date().getFullYear();

  // Filtered tasks
  const weekTasks = Object.values(tasks).filter(t => t.week === wl);
  const counts = {
    all: weekTasks.length,
    waiting:  weekTasks.filter(t => t.status === 'waiting').length,
    progress: weekTasks.filter(t => t.status === 'progress').length,
    done:     weekTasks.filter(t => t.status === 'done').length,
    hold:     weekTasks.filter(t => t.status === 'hold').length,
  };
  const rate = counts.all ? Math.round(counts.done / counts.all * 100) : 0;

  const shown = Object.entries(tasks)
    .filter(([, t]) => t.week === wl)
    .filter(([, t]) => filterStatus === 'all' || t.status === filterStatus)
    .filter(([, t]) => {
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return (t.title||'').toLowerCase().includes(q)
          || (t.department||'').toLowerCase().includes(q)
          || (t.assignee||'').toLowerCase().includes(q)
          || (t.description||'').toLowerCase().includes(q);
    })
    .sort(([,a],[,b]) => (b.createdAt||0) - (a.createdAt||0));

  document.getElementById('app').innerHTML = `
    <!-- Header -->
    <header class="hdr">
      <div class="logo">
        <div class="logo-dot"></div>
        WeekTask
      </div>
      <div class="hdr-right">
        <input class="input-search" id="search-input"
          type="text" placeholder="🔍 검색 (업무, 담당자, 부서)"
          value="${esc(searchQuery)}"
          oninput="onSearch(this.value)" />
        <button class="btn-primary" onclick="openModal()">+ 업무 추가</button>
      </div>
    </header>

    <!-- Week Navigation -->
    <div class="week-nav">
      <div class="wn-controls">
        <button class="btn-week" onclick="shiftWeek(-1)" title="이전 주">‹</button>
        <div>
          <div class="week-label">${wl}</div>
          <div class="week-sub">${currentYear}년 · ${range}</div>
        </div>
        <button class="btn-week" onclick="shiftWeek(1)" title="다음 주">›</button>
      </div>
      ${!isCurrentWeek ? `<button class="btn-today" onclick="goNow()">이번 주로</button>` : ''}
    </div>

    <!-- Status Filters -->
    <nav class="filters">
      ${[
        ['all', '전체', counts.all],
        ['waiting', '대기중', counts.waiting],
        ['progress', '진행중', counts.progress],
        ['done', '완료', counts.done],
        ['hold', '보류', counts.hold],
      ].map(([key, label, cnt]) => `
        <button class="filter-tab ${filterStatus===key?'active':''}" onclick="setFilter('${key}')">
          ${label} <span class="chip">${cnt}</span>
        </button>
      `).join('')}
    </nav>

    <!-- Main -->
    <main class="main">

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-label">전체 업무</div>
          <div class="stat-val" style="color:var(--text)">${counts.all}</div>
        </div>
        <div class="stat">
          <div class="stat-label">진행중</div>
          <div class="stat-val" style="color:var(--s-progress)">${counts.progress}</div>
        </div>
        <div class="stat">
          <div class="stat-label">완료</div>
          <div class="stat-val" style="color:var(--s-done)">${counts.done}</div>
        </div>
        <div class="stat">
          <div class="stat-label">완료율</div>
          <div class="stat-val" style="color:${rate>=80?'var(--s-done)':rate>=40?'var(--s-hold)':'var(--text2)'}">${rate}%</div>
        </div>
      </div>

      <!-- Tasks -->
      <div class="task-list">
        ${shown.length === 0
          ? `<div class="empty">
              <div class="empty-icon">📋</div>
              <div class="empty-title">${wl} 업무가 없습니다</div>
              <div class="empty-desc">+ 업무 추가 버튼으로 첫 번째 업무를 등록해 보세요.</div>
            </div>`
          : shown.map(([id, t]) => taskCard(id, t)).join('')
        }
      </div>
    </main>
  `;
}

function taskCard(id, t) {
  const st = STATUS[t.status] || STATUS.waiting;
  const pr = PRIORITY[t.priority] || PRIORITY.normal;
  return `
    <div class="task-card" id="tc-${id}">
      <div class="status-bar" style="background:${st.color}"></div>
      <div class="task-body">
        <div class="task-title ${t.status==='done'?'done-text':''}">${esc(t.title)}</div>
        <div class="task-meta">
          <span class="tag ${st.tagClass}">${st.label}</span>
          <span class="tag ${pr.tagClass}">${pr.label}</span>
          ${t.department ? `<span class="tag tag-dept">🏢 ${esc(t.department)}</span>` : ''}
          ${t.assignee   ? `<span class="tag tag-person">👤 ${esc(t.assignee)}</span>`  : ''}
        </div>
        ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
        <div class="quick-status">
          ${Object.entries(STATUS).map(([k,s]) => `
            <button class="qs-btn ${s.qsClass} ${t.status===k?'on':''}"
                    onclick="setStatus('${id}','${k}')">${s.label}</button>
          `).join('')}
        </div>
      </div>
      <div class="task-actions">
        <button class="btn-icon" onclick="openModal('${id}')" title="수정">✏️</button>
        <button class="btn-icon del" onclick="removeTask('${id}')" title="삭제">🗑</button>
      </div>
    </div>
  `;
}

// ── Modal ──
function openModal(id = null) {
  editingId = id;
  const t = id ? (tasks[id] || {}) : {};
  const wl = weekLabel(currentWeek);

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'modal-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  overlay.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-hdr">
        <div class="modal-title">${id ? '✏️ 업무 수정' : '➕ 업무 추가'}</div>
        <button class="btn-close" onclick="closeModal()" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="f-title">업무명 *</label>
          <input class="field" id="f-title" type="text"
            placeholder="업무 내용을 입력하세요" value="${esc(t.title||'')}" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-dept">부서</label>
            <input class="field" id="f-dept" type="text"
              placeholder="예: 기획팀" value="${esc(t.department||'')}" />
          </div>
          <div class="form-group">
            <label for="f-person">담당자</label>
            <input class="field" id="f-person" type="text"
              placeholder="예: 홍길동" value="${esc(t.assignee||'')}" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-week">주차</label>
            <input class="field" id="f-week" type="text"
              placeholder="예: W22" value="${esc(t.week||wl)}" />
          </div>
          <div class="form-group">
            <label for="f-priority">우선순위</label>
            <select class="field" id="f-priority">
              ${Object.entries(PRIORITY).map(([k,v]) =>
                `<option value="${k}" ${(t.priority||'normal')===k?'selected':''}>${v.label}</option>`
              ).join('')}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="f-status">상태</label>
          <select class="field" id="f-status">
            ${Object.entries(STATUS).map(([k,v]) =>
              `<option value="${k}" ${(t.status||'waiting')===k?'selected':''}>${v.label}</option>`
            ).join('')}
          </select>
        </div>
        <div class="form-group">
          <label for="f-desc">설명</label>
          <textarea class="field" id="f-desc"
            placeholder="업무 상세 내용, 참고 사항 등을 입력하세요">${esc(t.description||'')}</textarea>
        </div>
      </div>
      <div class="modal-ftr">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="saveTask()">저장</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('f-title')?.focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay')?.remove();
  editingId = null;
}

// ── CRUD ──
async function saveTask() {
  const titleEl = document.getElementById('f-title');
  const title = titleEl.value.trim();
  if (!title) { titleEl.classList.add('error'); titleEl.focus(); return; }

  const weekVal = (document.getElementById('f-week').value.trim() || weekLabel(currentWeek)).toUpperCase();

  const data = {
    title,
    department:  document.getElementById('f-dept').value.trim(),
    assignee:    document.getElementById('f-person').value.trim(),
    week:        weekVal,
    priority:    document.getElementById('f-priority').value,
    status:      document.getElementById('f-status').value,
    description: document.getElementById('f-desc').value.trim(),
    updatedAt:   Date.now(),
  };

  try {
    if (editingId) {
      await db.ref(`tasks/${editingId}`).update(data);
      toast('업무가 수정되었습니다', '✏️');
    } else {
      data.createdAt = Date.now();
      await db.ref('tasks').push(data);
      toast('업무가 추가되었습니다', '✅');
    }
    closeModal();
  } catch (e) {
    toast('저장 중 오류가 발생했습니다: ' + e.message, '⚠️');
  }
}

async function removeTask(id) {
  if (!confirm('이 업무를 삭제하시겠습니까?')) return;
  try {
    await db.ref(`tasks/${id}`).remove();
    toast('업무가 삭제되었습니다', '🗑');
  } catch(e) {
    toast('삭제 중 오류: ' + e.message, '⚠️');
  }
}

async function setStatus(id, status) {
  try {
    await db.ref(`tasks/${id}`).update({ status, updatedAt: Date.now() });
  } catch(e) {
    toast('상태 변경 오류: ' + e.message, '⚠️');
  }
}

// ── Navigation / Filters ──
function shiftWeek(delta) {
  currentWeek += delta;
  if (currentWeek < 1)  { currentWeek = 52; currentYear--; }
  if (currentWeek > 52) { currentWeek = 1;  currentYear++; }
  render();
}

function goNow() {
  const now = new Date();
  currentWeek = getWeekNum(now);
  currentYear = now.getFullYear();
  render();
}

function setFilter(s) { filterStatus = s; render(); }

function onSearch(val) { searchQuery = val; render(); }

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.ctrlKey && document.getElementById('modal-overlay')) saveTask();
});

// ── Init ──
(function init() {
  const configured = firebaseConfig.apiKey !== 'YOUR_API_KEY';

  if (!configured) {
    renderSetup();
    return;
  }

  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();

    db.ref('tasks').on('value', snap => {
      tasks = snap.val() || {};
      render();
    }, err => {
      document.getElementById('app').innerHTML = `
        <div class="loading" style="color:#f85149">
          <span style="font-size:36px">⚠️</span>
          <span>Firebase 연결 오류: ${esc(err.message)}</span>
        </div>`;
    });

  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="loading" style="color:#f85149">
        <span style="font-size:36px">⚠️</span>
        <span>${esc(e.message)}</span>
      </div>`;
  }
})();
</script>
</body>
