<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DART 재무정보 조회</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2438;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --text: #e8ecf4;
    --text-sub: #8892aa;
    --text-dim: #4a5270;
    --green: #34c98a;
    --red: #f05a6a;
    --yellow: #f5c842;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; min-height: 100vh; }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
  .logo-badge { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .api-status { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); }
  .api-status.ok { background: var(--green); }

  /* Layout */
  .app { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 56px); }

  /* Sidebar */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-section.grow { flex: 1; overflow-y: auto; }
  .section-label { font-size: 10px; font-weight: 600; color: var(--text-dim); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px; }

  /* Search */
  .search-box { display: flex; gap: 6px; }
  .search-box input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; padding: 8px 12px; outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-dim); }

  /* Year input */
  .year-input-wrap { display: flex; gap: 8px; align-items: center; }
  .year-input-wrap input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 8px 12px; outline: none; transition: border-color 0.2s; text-align: center; letter-spacing: 2px; }
  .year-input-wrap input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn { background: var(--accent); border: none; border-radius: 7px; color: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 14px; transition: opacity 0.2s, transform 0.1s; white-space: nowrap; }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-block { width: 100%; margin-top: 6px; padding: 10px; }

  /* Corp list */
  .corp-item { display: flex; flex-direction: column; padding: 9px 10px; border-radius: 7px; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; margin-bottom: 2px; }
  .corp-item:hover { background: var(--surface2); }
  .corp-item.active { background: rgba(79,142,247,0.1); border-color: rgba(79,142,247,0.3); }
  .corp-name { font-weight: 600; font-size: 13px; }
  .corp-meta { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

  /* Main */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  /* Tabs */
  .tab-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; height: 44px; }
  .tab { padding: 0 20px; height: 44px; display: flex; align-items: center; font-size: 13px; color: var(--text-sub); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Welcome */
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; color: var(--text-dim); }
  .welcome-icon { width: 60px; height: 60px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .welcome h2 { color: var(--text-sub); font-size: 15px; font-weight: 500; }
  .welcome p { font-size: 13px; color: var(--text-dim); }

  /* Company header */
  .corp-header { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .corp-header-left h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .corp-header-left p { font-size: 12px; color: var(--text-sub); }
  .corp-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(79,142,247,0.12); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
  .badge.green { background: rgba(52,201,138,0.12); color: var(--green); border-color: rgba(52,201,138,0.2); }

  /* KPI cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .kpi-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .kpi-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.5px; }
  .kpi-unit { font-size: 11px; color: var(--text-sub); font-family: 'Noto Sans KR', sans-serif; font-weight: 400; margin-left: 2px; }
  .kpi-change { font-size: 11px; margin-top: 4px; }

  /* Charts */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .chart-title { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 14px; letter-spacing: 0.3px; }
  .chart-wrap { position: relative; height: 180px; }

  /* Financial table */
  .fin-section { margin-bottom: 28px; }
  .fin-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .fin-title { font-size: 13px; font-weight: 600; color: var(--text-sub); display: flex; align-items: center; gap: 8px; }
  .fin-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
  .fin-unit { font-size: 11px; color: var(--text-dim); }

  .fin-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .fin-table th { background: var(--surface2); color: var(--text-sub); font-weight: 500; padding: 9px 14px; text-align: right; border-bottom: 1px solid var(--border); font-size: 11px; }
  .fin-table th:first-child { text-align: left; }
  .fin-table td { padding: 8px 14px; border-bottom: 1px solid rgba(42,48,80,0.5); text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .fin-table td:first-child { font-family: 'Noto Sans KR', sans-serif; text-align: left; color: var(--text-sub); padding-left: 20px; }
  .fin-table tr.group-header td { background: rgba(31,36,56,0.6); color: var(--text); font-weight: 600; font-family: 'Noto Sans KR', sans-serif; padding-left: 14px; }
  .fin-table tr:hover td { background: rgba(79,142,247,0.04); }
  .val-pos { color: var(--green); }
  .val-neg { color: var(--red); }

  /* Loading / Error */
  .loading { display: flex; align-items: center; justify-content: center; height: 200px; gap: 10px; color: var(--text-dim); }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(240,90,106,0.08); border: 1px solid rgba(240,90,106,0.25); border-radius: var(--radius); padding: 16px 20px; color: var(--red); font-size: 13px; }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-dim); font-size: 13px; }

  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">DART</div>
    재무정보 조회
  </div>
  <div class="api-status ok" id="apiStatus"></div>
</header>

<div class="app">
  <div class="sidebar">
    <!-- 기업 검색 -->
    <div class="sidebar-section">
      <div class="section-label">기업 검색</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="기업명 또는 종목코드" onkeydown="if(event.key==='Enter') searchCorp()">
        <button class="btn" onclick="searchCorp()">검색</button>
      </div>
    </div>

    <!-- 조회 연도 -->
    <div class="sidebar-section">
      <div class="section-label">조회 연도</div>
      <div class="year-input-wrap">
        <input type="number" id="yearInput" min="2010" max="2030" placeholder="예: 2024">
        <button class="btn" onclick="loadByYear()">조회</button>
      </div>
    </div>

    <!-- 기업 목록 -->
    <div class="sidebar-section grow">
      <div class="corp-list" id="corpList"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('overview')" id="tab-overview">기업 재무정보</div>
      <div class="tab" onclick="switchTab('financial')" id="tab-financial">상세 재무정보</div>
    </div>
    <div class="content" id="mainContent">
      <div class="welcome">
        <div class="welcome-icon">📊</div>
        <h2>DART 재무정보 조회</h2>
        <p>좌측에서 기업을 검색하고 연도를 입력하세요.</p>
      </div>
    </div>
  </div>
</div>

<script>
const FIXED_API_KEY = '6674f9aa0d9358b2693ab0dd6131773721c26a63';
const state = {
  apiKey: FIXED_API_KEY,
  selectedCorp: null,
  currentTab: 'overview',
  financialData: null,
  year: null,
  cache: { overview: null, financial: null },
};

window.onload = () => {
  const y = new Date().getFullYear() - 1;
  document.getElementById('yearInput').value = y;
};

// ── API ──
async function dartGet(endpoint, params, retry = 2) {
  const q = new URLSearchParams({ endpoint: endpoint.replace(/^\//, '') });
  for (const [k,v] of Object.entries(params)) if (v) q.set(k, v);
  try {
    const res = await fetch('/api/dart?' + q.toString());
    if (!res.ok) throw new Error('서버 오류: ' + res.status);
    const data = await res.json();
    if (data.status && data.status !== '000') throw new Error(data.message || '조회 실패 (' + data.status + ')');
    return data;
  } catch(e) {
    if (retry > 0) return dartGet(endpoint, params, retry - 1);
    throw e;
  }
}

// ── 기업 목록 ──
let corpListCache = null;
async function loadCorpList() {
  if (corpListCache) return corpListCache;
  const res = await fetch('/corps.json');
  if (!res.ok) throw new Error('기업 목록 로드 실패: ' + res.status);
  corpListCache = await res.json();
  return corpListCache;
}

// ── 검색 ──
async function searchCorp() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const listEl = document.getElementById('corpList');
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const all = await loadCorpList();
    const qL = q.toLowerCase();
    const matched = all.filter(c =>
      (c.corp_name && c.corp_name.toLowerCase().includes(qL)) ||
      (c.stock_code && c.stock_code.includes(q))
    );
    if (!matched.length) { listEl.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text-dim)">검색 결과 없음</div>'; return; }
    matched.sort((a,b) => {
      const r = c => {
        const n = c.corp_name.toLowerCase();
        const hasStock = !!c.stock_code;
        if (n === qL && hasStock) return 0;   // 완전일치 + 상장사
        if (n === qL)            return 1;   // 완전일치 + 비상장
        if (n.startsWith(qL) && hasStock) return 2;  // 시작일치 + 상장사
        if (n.startsWith(qL))   return 3;   // 시작일치 + 비상장
        if (hasStock)            return 4;   // 포함일치 + 상장사
        return 5;                            // 포함일치 + 비상장
      };
      return r(a) - r(b);
    });
    listEl.innerHTML = matched.slice(0,50).map(c => `
      <div class="corp-item" onclick="selectCorp('${c.corp_code}','${escHtml(c.corp_name)}','${c.stock_code||''}')">
        <span class="corp-name">${highlight(escHtml(c.corp_name), q)}</span>
        <span class="corp-meta">${c.stock_code ? '📈 '+c.stock_code : '비상장'} · ${c.corp_code}</span>
      </div>
    `).join('') + (matched.length > 50 ? `<div style="padding:8px;font-size:11px;color:var(--text-dim)">외 ${matched.length-50}개</div>` : '');
  } catch(e) {
    listEl.innerHTML = `<div class="error-box">❌ ${escHtml(e.message)}</div>`;
  }
}

function selectCorp(corpCode, corpName, stockCode) {
  state.selectedCorp = { corpCode, corpName, stockCode };
  state.financialData = null;
  state.cache = { overview: null, financial: null };
  document.querySelectorAll('.corp-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  loadData();
}

function loadByYear() {
  if (!state.selectedCorp) { alert('기업을 먼저 선택해주세요.'); return; }
  state.financialData = null;
  state.cache = { overview: null, financial: null };
  loadData();
}

// ── 숫자 유틸 ──
function parseNum(s) {
  if (!s) return null;
  const n = parseInt(String(s).replace(/,/g,'').trim());
  return isNaN(n) ? null : n;
}
function toM(s) {
  const n = parseNum(s);
  if (n === null) return null;
  return Math.round(n / 1000000);
}
function fmtBig(s) {
  const n = toM(s);
  if (n === null) return '-';
  const abs = Math.abs(n);
  if (abs >= 1000000) return (n/1000000).toFixed(1) + '조';
  if (abs >= 10000) return Math.round(n/10000) + '억';
  return n.toLocaleString() + '백만';
}

// 연도별 재무데이터 로딩 (CFS 우선, 실패시 OFS)
async function fetchYear(corpCode, year) {
  try {
    const d = await dartGet('/fnlttSinglAcntAll.json', { corp_code: corpCode, bsns_year: String(year), reprt_code: '11011', fs_div: 'CFS' });
    if (d.list && d.list.length) return { year, list: d.list, fsDiv: 'CFS' };
  } catch {}
  try {
    const d = await dartGet('/fnlttSinglAcntAll.json', { corp_code: corpCode, bsns_year: String(year), reprt_code: '11011', fs_div: 'OFS' });
    return { year, list: d.list || [], fsDiv: 'OFS' };
  } catch { return { year, list: [], fsDiv: 'OFS' }; }
}

async function loadData() {
  const year = parseInt(document.getElementById('yearInput').value);
  if (!year || year < 2010 || year > 2030) { alert('올바른 연도를 입력해주세요.'); return; }
  state.year = year;
  state.cache = { overview: null, financial: null };
  showLoading();

  try {
    const corpCode = state.selectedCorp.corpCode;
    const years = [year-4, year-3, year-2, year-1, year];

    // 5개년 재무데이터 + 회사정보 전부 동시 병렬 호출
    const [corpInfo, ...multiYearData] = await Promise.all([
      dartGet('/company.json', { corp_code: corpCode }).catch(() => ({})),
      ...years.map(y => fetchYear(corpCode, y))
    ]);

    const baseYear = multiYearData.find(d => d.year === year);
    const fsDiv = baseYear?.fsDiv || 'CFS';

    state.financialData = {
      list: baseYear?.list || [],
      fsDiv,
      corpInfo,
      multiYear: multiYearData,
    };

    if (state.currentTab === 'overview') renderOverview();
    else renderFinancial();
  } catch(e) {
    setContent(`<div class="error-box">❌ ${escHtml(e.message)}</div>`);
  }
}

// 5개년 데이터에서 특정 계정 값 추출
function getMultiYear(multiYear, ...kws) {
  return multiYear.map(({ year, list }) => {
    const is_ = list.filter(r => r.sj_div === 'IS' || r.sj_div === 'CIS');
    const bs  = list.filter(r => r.sj_div === 'BS');
    const all = [...is_, ...bs];
    const row = all.find(r => r.account_nm && kws.some(k => r.account_nm.includes(k)));
    return { year, val: row ? toM(row.thstrm_amount) : null };
  });
}

// ── 기업 재무정보 탭 ──
function renderOverview() {
  const { list, fsDiv, corpInfo, multiYear } = state.financialData;
  const year = state.year;
  const corp = state.selectedCorp;

  const bs  = list.filter(r => r.sj_div === 'BS');
  const is_ = list.filter(r => r.sj_div === 'IS' || r.sj_div === 'CIS');
  const find = (arr, ...kws) => arr.find(r => r.account_nm && kws.some(k => r.account_nm.includes(k)));

  const revenue    = find(is_, '매출액', '수익(매출액)', '영업수익');
  const opIncome   = find(is_, '영업이익');
  const netIncome  = find(is_, '당기순이익');
  const totalAsset = find(bs, '자산총계');
  const equity     = find(bs, '자본총계');
  const totalDebt  = find(bs, '부채총계');

  const cur  = k => toM(k?.thstrm_amount);
  const prev = k => toM(k?.frmtrm_amount);
  const calcR = (a, b) => (a !== null && b && b !== 0) ? (a / Math.abs(b) * 100) : null;

  const roa = calcR(cur(netIncome), cur(totalAsset));
  const roe = calcR(cur(netIncome), cur(equity));
  const opMargin  = calcR(cur(opIncome), cur(revenue));
  const netMargin = calcR(cur(netIncome), cur(revenue));
  const debtRatio = calcR(cur(totalDebt), cur(equity));
  const yoy = (c, p) => (c !== null && p !== null && p !== 0) ? ((c-p)/Math.abs(p)*100).toFixed(1) : null;

  // 5개년 시계열
  const myRev = getMultiYear(multiYear, '매출액', '수익(매출액)', '영업수익');
  const myOp  = getMultiYear(multiYear, '영업이익');
  const myNet = getMultiYear(multiYear, '당기순이익');
  const myAsset = getMultiYear(multiYear, '자산총계');
  const myEquity= getMultiYear(multiYear, '자본총계');
  const myInv   = getMultiYear(multiYear, '재고자산');
  const myInvAllw = getMultiYear(multiYear, '재고자산평가충당금', '평가충당금');

  const labels5 = multiYear.map(d => d.year + '년');
  const vals = arr => arr.map(d => d.val);

  // 수익성 5개년
  const myOpMargin  = multiYear.map(({ year: y, list: l }) => {
    const is = l.filter(r => r.sj_div === 'IS' || r.sj_div === 'CIS');
    const rev = is.find(r => r.account_nm && ['매출액','수익(매출액)','영업수익'].some(k => r.account_nm.includes(k)));
    const op  = is.find(r => r.account_nm && r.account_nm.includes('영업이익'));
    const rv = toM(rev?.thstrm_amount), ov = toM(op?.thstrm_amount);
    return (rv && rv !== 0) ? parseFloat((ov/rv*100).toFixed(2)) : null;
  });
  const myNetMargin = multiYear.map(({ year: y, list: l }) => {
    const is = l.filter(r => r.sj_div === 'IS' || r.sj_div === 'CIS');
    const rev = is.find(r => r.account_nm && ['매출액','수익(매출액)','영업수익'].some(k => r.account_nm.includes(k)));
    const net = is.find(r => r.account_nm && r.account_nm.includes('당기순이익'));
    const rv = toM(rev?.thstrm_amount), nv = toM(net?.thstrm_amount);
    return (rv && rv !== 0) ? parseFloat((nv/rv*100).toFixed(2)) : null;
  });
  const myROA = multiYear.map(({ list: l }) => {
    const bs = l.filter(r => r.sj_div === 'BS'), is = l.filter(r => r.sj_div === 'IS' || r.sj_div === 'CIS');
    const asset = bs.find(r => r.account_nm?.includes('자산총계'));
    const net   = is.find(r => r.account_nm?.includes('당기순이익'));
    const av = toM(asset?.thstrm_amount), nv = toM(net?.thstrm_amount);
    return (av && av !== 0) ? parseFloat((nv/av*100).toFixed(2)) : null;
  });
  const myROE = multiYear.map(({ list: l }) => {
    const bs = l.filter(r => r.sj_div === 'BS'), is = l.filter(r => r.sj_div === 'IS' || r.sj_div === 'CIS');
    const eq  = bs.find(r => r.account_nm?.includes('자본총계'));
    const net = is.find(r => r.account_nm?.includes('당기순이익'));
    const ev = toM(eq?.thstrm_amount), nv = toM(net?.thstrm_amount);
    return (ev && ev !== 0) ? parseFloat((nv/ev*100).toFixed(2)) : null;
  });

  const html = `
    <div class="corp-header">
      <div class="corp-header-left">
        <h2>${escHtml(corpInfo.corp_name || corp.corpName)}</h2>
        <p>${escHtml(corpInfo.adres || '')}${corpInfo.ceo_nm ? ' · 대표 ' + corpInfo.ceo_nm : ''}</p>
        <div class="corp-badges">
          ${corp.stockCode ? `<span class="badge green">📈 ${corp.stockCode}</span>` : ''}
          <span class="badge">${year}년 ${fsDiv === 'CFS' ? '연결' : '개별'}재무제표</span>
          <span class="badge">단위: 백만원</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">결산월</div>
        <div style="font-size:22px;font-weight:700">${corpInfo.acc_mt ? corpInfo.acc_mt+'월' : '-'}</div>
      </div>
    </div>

    <div class="kpi-grid">
      ${kpiCard('매출액',     fmtBig(revenue?.thstrm_amount),    yoy(cur(revenue),    prev(revenue)))}
      ${kpiCard('영업이익',   fmtBig(opIncome?.thstrm_amount),   yoy(cur(opIncome),   prev(opIncome)))}
      ${kpiCard('당기순이익', fmtBig(netIncome?.thstrm_amount),  yoy(cur(netIncome),  prev(netIncome)))}
      ${kpiCard('총자산',     fmtBig(totalAsset?.thstrm_amount), null)}
      ${kpiCard('자본총계',   fmtBig(equity?.thstrm_amount),     null)}
      ${kpiCard('부채총계',   fmtBig(totalDebt?.thstrm_amount),  null)}
    </div>

    <div class="kpi-grid">
      ${ratioCard('ROA',      roa,       '총자산순이익률')}
      ${ratioCard('ROE',      roe,       '자기자본이익률')}
      ${ratioCard('영업이익률', opMargin,  'Operating Margin')}
      ${ratioCard('순이익률',  netMargin, 'Net Margin')}
      ${ratioCard('부채비율',  debtRatio, 'Debt Ratio')}
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">📊 매출액 추이 (${year-4}~${year})</div>
        <div class="chart-wrap" style="height:200px"><canvas id="chartRev"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📊 영업이익 · 당기순이익 추이</div>
        <div class="chart-wrap" style="height:200px"><canvas id="chartOpNet"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📈 영업이익률 · 순이익률 추이 (%)</div>
        <div class="chart-wrap" style="height:200px"><canvas id="chartMargin"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📈 ROA · ROE 추이 (%)</div>
        <div class="chart-wrap" style="height:200px"><canvas id="chartROAROE"></canvas></div>
      </div>
    </div>
  `;

  setContent(html, 'overview');

  setTimeout(() => {
    const gridColor = 'rgba(42,48,80,0.8)';
    const tickColor = '#8892aa';
    const baseScales = {
      x: { ticks: { color: tickColor, font: { size: 10 } }, grid: { color: gridColor } },
      y: { ticks: { color: tickColor, font: { size: 10 } }, grid: { color: gridColor } }
    };
    const legendOpts = { labels: { color: tickColor, font: { size: 11 }, boxWidth: 12 } };
    const ttMoney = { callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.raw||0).toLocaleString() + '백만원' } };
    const ttPct   = { callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.raw||0).toFixed(1) + '%' } };
    const pctScale = { ...baseScales, y: { ...baseScales.y, ticks: { ...baseScales.y.ticks, callback: v => v + '%' } } };

    // ── 차트1: 매출액 막대 ──
    new Chart(document.getElementById('chartRev'), {
      type: 'bar',
      data: {
        labels: labels5,
        datasets: [{
          label: '매출액',
          data: vals(myRev),
          backgroundColor: 'rgba(79,142,247,0.6)',
          borderColor: 'rgba(79,142,247,0.9)',
          borderWidth: 1, borderRadius: 5,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: ttMoney },
        scales: baseScales
      }
    });

    // ── 차트2: 영업이익·당기순이익 그룹 막대 ──
    new Chart(document.getElementById('chartOpNet'), {
      type: 'bar',
      data: {
        labels: labels5,
        datasets: [
          {
            label: '영업이익',
            data: vals(myOp),
            backgroundColor: 'rgba(52,201,138,0.65)',
            borderColor: 'rgba(52,201,138,0.9)',
            borderWidth: 1, borderRadius: 4,
          },
          {
            label: '당기순이익',
            data: vals(myNet),
            backgroundColor: 'rgba(245,200,66,0.65)',
            borderColor: 'rgba(245,200,66,0.9)',
            borderWidth: 1, borderRadius: 4,
          },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: legendOpts, tooltip: ttMoney },
        scales: baseScales
      }
    });

    // ── 차트3: 영업이익률·순이익률 꺾은선 ──
    new Chart(document.getElementById('chartMargin'), {
      type: 'line',
      data: {
        labels: labels5,
        datasets: [
          {
            label: '영업이익률',
            data: myOpMargin,
            borderColor: 'rgba(79,142,247,1)',
            backgroundColor: 'rgba(79,142,247,0.15)',
            fill: true, tension: 0.3,
            pointBackgroundColor: 'rgba(79,142,247,1)', pointRadius: 4,
          },
          {
            label: '순이익률',
            data: myNetMargin,
            borderColor: 'rgba(124,92,191,1)',
            backgroundColor: 'rgba(124,92,191,0.15)',
            fill: true, tension: 0.3,
            pointBackgroundColor: 'rgba(124,92,191,1)', pointRadius: 4,
          },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: legendOpts, tooltip: ttPct },
        scales: pctScale
      }
    });

    // ── 차트4: ROA·ROE 꺾은선 ──
    new Chart(document.getElementById('chartROAROE'), {
      type: 'line',
      data: {
        labels: labels5,
        datasets: [
          {
            label: 'ROA',
            data: myROA,
            borderColor: 'rgba(52,201,138,1)',
            backgroundColor: 'rgba(52,201,138,0.15)',
            fill: true, tension: 0.3,
            pointBackgroundColor: 'rgba(52,201,138,1)', pointRadius: 4,
          },
          {
            label: 'ROE',
            data: myROE,
            borderColor: 'rgba(240,90,106,1)',
            backgroundColor: 'rgba(240,90,106,0.12)',
            fill: true, tension: 0.3,
            pointBackgroundColor: 'rgba(240,90,106,1)', pointRadius: 4,
          },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: legendOpts, tooltip: ttPct },
        scales: pctScale
      }
    });
  }, 50);
}

function kpiCard(label, value, yoyPct) {
  let change = '';
  if (yoyPct !== null) {
    const color = parseFloat(yoyPct) >= 0 ? 'var(--green)' : 'var(--red)';
    change = `<div class="kpi-change" style="color:${color}">${parseFloat(yoyPct)>=0?'▲':'▼'} ${Math.abs(yoyPct)}% YoY</div>`;
  }
  return `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${change}</div>`;
}

function ratioCard(label, value, sub) {
  const v = value !== null ? value.toFixed(1) : '-';
  const color = value === null ? 'var(--text)' : value >= 0 ? 'var(--green)' : 'var(--red)';
  return `<div class="kpi-card"><div class="kpi-label">${label} <span style="color:var(--text-dim);font-size:10px">${sub}</span></div><div class="kpi-value" style="color:${color}">${v}<span class="kpi-unit">%</span></div></div>`;
}

// ── 상세 재무정보 탭 ──
function renderFinancial() {
  const { list, fsDiv } = state.financialData;
  const year = state.year;

  const bs  = list.filter(r => r.sj_div === 'BS');
  const is_ = list.filter(r => r.sj_div === 'IS' || r.sj_div === 'CIS');
  const cf  = list.filter(r => r.sj_div === 'CF');

  const html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <strong style="font-size:15px">${escHtml(state.selectedCorp.corpName)}</strong>
        <span style="color:var(--text-dim);font-size:12px;margin-left:8px">${year}년 ${fsDiv==='CFS'?'연결':'개별'}재무제표</span>
      </div>
    </div>
    ${finTable('재무상태표 (Balance Sheet)', bs, year)}
    ${finTable('손익계산서 (Income Statement)', is_, year)}
    ${cf.length ? finTable('현금흐름표 (Cash Flow)', cf, year) : ''}
  `;

  setContent(html, 'financial');
}

function finTable(title, rows, year) {
  if (!rows.length) return '';
  const prev = year - 1;
  return `
    <div class="fin-section">
      <div class="fin-section-header">
        <div class="fin-title">${title}</div>
        <div class="fin-unit">단위: 백만원</div>
      </div>
      <table class="fin-table">
        <thead>
          <tr>
            <th>계정과목</th>
            <th>${year}년 (당기)</th>
            <th>${prev}년 (전기)</th>
            <th>증감</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => {
            const cn = toM(r.thstrm_amount);
            const pn = toM(r.frmtrm_amount);
            const diff = (cn !== null && pn !== null) ? cn - pn : null;
            const pct  = (diff !== null && pn && pn !== 0) ? (diff/Math.abs(pn)*100).toFixed(1) : null;
            const isGroup = r.indent_level === '0' || (r.account_id && r.account_id.endsWith('0'));
            return `<tr class="${isGroup ? 'group-header' : ''}">
              <td style="padding-left:${isGroup?'14':'28'}px">${escHtml(r.account_nm||'')}</td>
              <td>${cn !== null ? cn.toLocaleString('ko-KR') : '-'}</td>
              <td>${pn !== null ? pn.toLocaleString('ko-KR') : '-'}</td>
              <td class="${diff===null?'':diff>=0?'val-pos':'val-neg'}">
                ${diff !== null ? (diff>=0?'+':'')+diff.toLocaleString('ko-KR') : '-'}
                ${pct !== null ? `<span style="font-size:10px;opacity:0.7"> (${diff>=0?'+':''}${pct}%)</span>` : ''}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── 탭 전환 ──
function switchTab(tab) {
  if (state.currentTab === tab && state.cache[tab]) return;
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (state.cache[tab]) { document.getElementById('mainContent').innerHTML = state.cache[tab]; redrawCharts(); return; }
  if (!state.financialData) return;
  if (tab === 'overview') renderOverview();
  else renderFinancial();
}

function redrawCharts() {
  // 캐시된 overview 탭 복원 시 차트 재그리기
  if (state.currentTab === 'overview' && state.financialData) {
    state.cache['overview'] = null;
    renderOverview();
  }
}

// ── Helpers ──
function setContent(html, cacheTab) {
  document.getElementById('mainContent').innerHTML = html;
  if (cacheTab) state.cache[cacheTab] = html;
}
function showLoading() { document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div> 데이터 조회 중…</div>'; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function highlight(text, q) {
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0,idx) + `<span style="color:var(--accent);font-weight:700">${text.slice(idx,idx+q.length)}</span>` + text.slice(idx+q.length);
}
</script>
