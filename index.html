<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DART 공시 조회</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2438;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --text: #e8ecf4;
    --text-sub: #8892aa;
    --text-dim: #4a5270;
    --green: #34c98a;
    --red: #f05a6a;
    --yellow: #f5c842;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.3px;
  }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #apiKeyInput {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }
  #apiKeyInput:focus { border-color: var(--accent); }
  #apiKeyInput::placeholder { color: var(--text-dim); }
  .api-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .api-status.ok { background: var(--green); }
  .api-status.err { background: var(--red); }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 56px);
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Search */
  .search-box {
    display: flex;
    gap: 6px;
  }
  .search-box input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-dim); }
  .btn {
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: #fff;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-sm {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 5px;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-sub);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

  /* Search Results */
  .corp-list { margin-top: 10px; }
  .corp-item {
    display: flex;
    flex-direction: column;
    padding: 10px 12px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .corp-item:hover { background: var(--surface2); }
  .corp-item.active {
    background: rgba(79,142,247,0.1);
    border-color: rgba(79,142,247,0.3);
  }
  .corp-name { font-weight: 600; font-size: 13px; }
  .corp-meta { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

  /* Filters */
  .filter-row { display: flex; flex-direction: column; gap: 8px; }
  .filter-group label {
    display: block;
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 4px;
  }
  .filter-group select,
  .filter-group input[type="date"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  .filter-group select:focus,
  .filter-group input[type="date"]:focus { border-color: var(--accent); }
  .filter-group select option { background: var(--surface2); }
  .date-range { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  /* Disclosure list */
  .disc-list { padding: 0; }
  .disc-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .disc-item:hover { background: var(--surface2); }
  .disc-item.active { background: rgba(79,142,247,0.08); border-left: 3px solid var(--accent); }
  .disc-title { font-size: 12px; font-weight: 500; line-height: 1.5; margin-bottom: 4px; }
  .disc-meta { font-size: 11px; color: var(--text-sub); display: flex; gap: 8px; flex-wrap: wrap; }
  .disc-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(79,142,247,0.15);
    color: var(--accent);
    font-weight: 500;
  }

  /* ── Main ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Tabs */
  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 0;
    align-items: flex-end;
    height: 44px;
  }
  .tab {
    padding: 0 18px;
    height: 44px;
    display: flex;
    align-items: center;
    font-size: 13px;
    color: var(--text-sub);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* Content */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-dim);
  }
  .welcome-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .welcome h2 { color: var(--text-sub); font-size: 16px; font-weight: 500; }
  .welcome p { font-size: 13px; text-align: center; line-height: 1.7; max-width: 360px; }
  .welcome-steps {
    display: flex;
    gap: 20px;
    margin-top: 8px;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    width: 90px;
  }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
  }

  /* Info card */
  .info-banner {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .info-banner h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .info-banner p { font-size: 12px; color: var(--text-sub); }
  .info-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .info-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.2);
  }
  .info-badge.market { background: rgba(52,201,138,0.12); color: var(--green); border-color: rgba(52,201,138,0.2); }

  /* Financial table */
  .fin-section { margin-bottom: 28px; }
  .fin-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fin-title::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  .fin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .fin-table th {
    background: var(--surface2);
    color: var(--text-sub);
    font-weight: 500;
    padding: 9px 14px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.3px;
  }
  .fin-table th:first-child { text-align: left; }
  .fin-table td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(42,48,80,0.5);
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .fin-table td:first-child {
    font-family: 'Noto Sans KR', sans-serif;
    text-align: left;
    color: var(--text-sub);
    font-size: 12px;
    padding-left: 20px;
  }
  .fin-table tr.group-header td {
    background: rgba(31,36,56,0.5);
    color: var(--text);
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    padding-left: 14px;
    font-size: 12px;
  }
  .fin-table tr:hover td { background: rgba(79,142,247,0.04); }
  .val-pos { color: var(--green); }
  .val-neg { color: var(--red); }

  /* Stat cards */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.5px; }
  .stat-unit { font-size: 11px; color: var(--text-sub); margin-left: 3px; font-family: 'Noto Sans KR', sans-serif; font-weight: 400; }
  .stat-change { font-size: 11px; margin-top: 4px; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    gap: 10px;
    color: var(--text-dim);
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    background: rgba(240,90,106,0.08);
    border: 1px solid rgba(240,90,106,0.25);
    border-radius: var(--radius);
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 16px;
  }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* Disclosure list panel */
  .disc-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 100px);
  }

  /* Link style */
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Grid for main area */
  .main-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100%;
    overflow: hidden;
  }
  .disc-panel-wrap {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .disc-panel-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .disc-count {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .no-api-notice {
    background: rgba(245,200,66,0.08);
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--yellow);
    font-size: 12px;
    margin: 12px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">DART</div>
    공시 재무제표 조회
  </div>
  <div class="header-right">
    <div class="api-status" id="apiStatus"></div>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- 기업 검색 -->
    <div class="sidebar-section">
      <div class="section-label">기업 검색</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="기업명 또는 종목코드" onkeydown="if(event.key==='Enter') searchCorp()">
        <button class="btn" onclick="searchCorp()">검색</button>
      </div>
      <div class="corp-list" id="corpList"></div>
    </div>

    <!-- 필터 -->
    <div class="sidebar-section">
      <div class="section-label">조회 조건</div>
      <div class="filter-row">
        <div class="filter-group">
          <label>보고서 유형</label>
          <select id="reportType">
            <option value="">전체</option>
            <option value="A001">사업보고서</option>
            <option value="A002">반기보고서</option>
            <option value="A003">분기보고서</option>
            <option value="B001">주요사항보고서</option>
            <option value="B002">주요경영사항</option>
          </select>
        </div>
        <div class="filter-group">
          <label>조회 기간</label>
          <div class="date-range">
            <input type="date" id="dateFrom" value="2024-01-01">
            <input type="date" id="dateTo">
          </div>
        </div>
        <button class="btn" style="width:100%" onclick="searchDisclosures()">공시 조회</button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('overview')" id="tab-overview">기업 정보</div>
      <div class="tab" onclick="switchTab('disclosures')" id="tab-disclosures">공시 목록</div>
      <div class="tab" onclick="switchTab('financial')" id="tab-financial">재무제표</div>
    </div>

    <div class="content" id="mainContent">
      <!-- Welcome -->
      <div class="welcome">
        <div class="welcome-icon">📊</div>
        <h2>DART 공시 재무제표 조회</h2>
        <p>좌측에서 기업명 또는 종목코드를 검색하세요.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ── Constants ──
const FIXED_API_KEY = '6674f9aa0d9358b2693ab0dd6131773721c26a63';
const DART_BASE = 'https://opendart.fss.or.kr/api';

// ── State ──
const state = {
  apiKey: FIXED_API_KEY,
  selectedCorp: null,
  currentTab: 'overview',
  disclosures: [],
  financialData: null,
};

// ── Init ──
window.onload = () => {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('dateTo').value = today;
  setApiStatus('ok');
};

function setApiStatus(s) {
  const el = document.getElementById('apiStatus');
  el.className = 'api-status ' + (s || '');
}

function requireKey() { return true; }

// ── DART API 호출 (다중 프록시) ──
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://proxy.cors.sh/${u}`,
];

async function dartFetch(url) {
  for (const make of PROXIES) {
    try {
      const res = await fetch(make(url));
      if (!res.ok) continue;
      const buf = await res.arrayBuffer();
      if (!buf.byteLength) continue;
      return buf;
    } catch {}
  }
  throw new Error('네트워크 연결 실패 — 모든 프록시 차단됨');
}

async function dartGet(endpoint, params) {
  const url = new URL(DART_BASE + endpoint);
  url.searchParams.set('crtfc_key', state.apiKey);
  for (const [k,v] of Object.entries(params)) if (v) url.searchParams.set(k, v);

  const buf = await dartFetch(url.toString());
  const text = new TextDecoder('utf-8').decode(buf);
  const data = JSON.parse(text);
  if (data.status && data.status !== '000') throw new Error(data.message || '조회 실패 (' + data.status + ')');
  return data;
}

// ── 전체 기업 목록 (ZIP → XML 파싱, 세션 캐시) ──
let corpListCache = null;

async function loadCorpList() {
  if (corpListCache) return corpListCache;

  const zipUrl = `https://opendart.fss.or.kr/api/corpCode.xml?crtfc_key=${state.apiKey}`;
  const buf = await dartFetch(zipUrl);

  // JSZip으로 압축 해제
  const JSZip = await loadJSZip();
  const zip = await JSZip.loadAsync(buf);
  const xmlText = await zip.file('CORPCODE.xml').async('string');

  // XML 파싱
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const items = doc.querySelectorAll('list');
  const corps = [];
  items.forEach(el => {
    const name = el.querySelector('corp_name')?.textContent || '';
    const code = el.querySelector('corp_code')?.textContent || '';
    const stock = el.querySelector('stock_code')?.textContent?.trim() || '';
    const modify = el.querySelector('modify_date')?.textContent || '';
    if (name && code) corps.push({ corp_name: name, corp_code: code, stock_code: stock, modify_date: modify });
  });

  corpListCache = corps;
  return corps;
}

function loadJSZip() {
  return new Promise((resolve, reject) => {
    if (window.JSZip) { resolve(window.JSZip); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload = () => resolve(window.JSZip);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ── Corp Search (ZIP 기반 포함 검색) ──
async function searchCorp() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const listEl = document.getElementById('corpList');
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div> 기업 목록 로딩 중…</div>';

  try {
    const corps = await loadCorpList();

    const qLower = q.toLowerCase();
    const matched = corps.filter(c =>
      c.corp_name.toLowerCase().includes(qLower) ||
      (c.stock_code && c.stock_code.includes(q))
    );

    if (!matched.length) {
      listEl.innerHTML = '<div class="empty-state" style="padding:16px;font-size:12px">검색 결과가 없습니다.</div>';
      return;
    }

    // 상장사 우선 정렬
    matched.sort((a,b) => {
      const aS = a.stock_code ? 1 : 0;
      const bS = b.stock_code ? 1 : 0;
      return bS - aS;
    });

    listEl.innerHTML = matched.slice(0,30).map(c => `
      <div class="corp-item" onclick="selectCorp('${c.corp_code}','${escHtml(c.corp_name)}','${c.stock_code||''}','')">
        <span class="corp-name">${highlight(escHtml(c.corp_name), q)}</span>
        <span class="corp-meta">
          ${c.stock_code ? '📈 ' + c.stock_code : '비상장'} &nbsp;·&nbsp; ${c.corp_code}
        </span>
      </div>
    `).join('') + (matched.length > 30 ? `<div style="padding:8px 12px;font-size:11px;color:var(--text-dim)">외 ${matched.length-30}개 — 더 구체적으로 검색해보세요</div>` : '');

  } catch(e) {
    listEl.innerHTML = `<div class="error-box">❌ ${e.message}</div>`;
    setApiStatus('err');
  }
}

// 검색어 하이라이트
function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0, idx) +
    `<span style="color:var(--accent);font-weight:700">${text.slice(idx, idx+q.length)}</span>` +
    text.slice(idx + q.length);
}


async function selectCorp(corpCode, corpName, stockCode, jurirNo) {
  state.selectedCorp = { corpCode, corpName, stockCode, jurirNo };
  state.disclosures = [];
  state.financialData = null;

  document.querySelectorAll('.corp-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  switchTab('overview');
  await loadCorpInfo(corpCode);
}

async function loadCorpInfo(corpCode) {
  showLoading();
  try {
    const data = await dartGet('/company.json', { corp_code: corpCode });
    renderOverview(data);
  } catch(e) {
    showError(e.message);
  }
}

function renderOverview(c) {
  const s = state.selectedCorp;
  setContent(`
    <div class="info-banner">
      <div>
        <h3>${escHtml(c.corp_name || s.corpName)}</h3>
        <p>${escHtml(c.adres || '')} &nbsp;|&nbsp; ${escHtml(c.hm_url || '')}</p>
        <div class="info-badges" style="margin-top:8px">
          ${s.stockCode ? `<span class="info-badge market">KOSPI/KOSDAQ ${s.stockCode}</span>` : ''}
          <span class="info-badge">${escHtml(c.induty_code || '')}</span>
          <span class="info-badge">${escHtml(c.corp_code || '')}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">결산월</div>
        <div style="font-size:22px;font-weight:700">${c.acc_mt ? c.acc_mt + '월' : '-'}</div>
      </div>
    </div>
    <div class="stat-grid">
      ${statCard('대표이사', c.ceo_nm || '-', '')}
      ${statCard('법인구분', c.corp_cls === 'Y' ? '유가증권' : c.corp_cls === 'K' ? '코스닥' : c.corp_cls === 'N' ? '코넥스' : '기타', '')}
      ${statCard('법인등록번호', c.jurir_no || '-', '')}
      ${statCard('사업자등록번호', c.bizr_no || '-', '')}
      ${statCard('전화번호', c.phn_no || '-', '')}
      ${statCard('설립일', c.est_dt ? fmtDate(c.est_dt) : '-', '')}
    </div>
    <div style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="searchDisclosures()">📄 공시 목록 조회</button>
      <button class="btn btn-ghost" onclick="loadFinancial()">📊 재무제표 조회</button>
      ${c.hm_url ? `<a href="${escHtml(c.hm_url)}" target="_blank" class="btn btn-ghost" style="display:inline-flex;align-items:center">🌐 홈페이지</a>` : ''}
    </div>
  `);
}

// ── Disclosures ──
async function searchDisclosures() {
  if (!state.selectedCorp) { alert('먼저 기업을 선택해주세요.'); return; }
  switchTab('disclosures');
  showLoading();
  try {
    const params = {
      corp_code: state.selectedCorp.corpCode,
      bgn_de: document.getElementById('dateFrom').value.replace(/-/g,''),
      end_de: document.getElementById('dateTo').value.replace(/-/g,''),
      pblntf_ty: document.getElementById('reportType').value,
      page_count: '40',
    };
    const data = await dartGet('/list.json', params);
    state.disclosures = data.list || [];
    renderDisclosures(state.disclosures);
  } catch(e) {
    showError(e.message);
  }
}

function renderDisclosures(list) {
  if (!list.length) {
    setContent('<div class="empty-state">해당 기간에 공시 내역이 없습니다.</div>');
    return;
  }
  setContent(`
    <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <strong>${escHtml(state.selectedCorp.corpName)}</strong>
        <span style="color:var(--text-dim);font-size:12px;margin-left:8px">총 ${list.length}건</span>
      </div>
    </div>
    <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      ${list.map(d => `
        <div class="disc-item" onclick="openDisclosure('${d.rcept_no}')">
          <div class="disc-title">
            <span class="disc-badge">${escHtml(d.pblntf_ty_nm||'')}</span>
            &nbsp;${escHtml(d.report_nm)}
          </div>
          <div class="disc-meta">
            <span>${fmtDate(d.rcept_dt)}</span>
            <span>${escHtml(d.flr_nm||'')}</span>
            ${d.rm ? `<span style="color:var(--yellow)">${escHtml(d.rm)}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `);
}

function openDisclosure(rceptNo) {
  window.open(`https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${rceptNo}`, '_blank');
}

// ── Financial ──
async function loadFinancial() {
  if (!state.selectedCorp) { alert('먼저 기업을 선택해주세요.'); return; }
  switchTab('financial');
  showLoading();
  const year = new Date().getFullYear() - 1;
  await fetchFinancial(year);
}

async function fetchFinancial(year) {
  try {
    let data;
    try {
      data = await dartGet('/fnlttSinglAcntAll.json', {
        corp_code: state.selectedCorp.corpCode,
        bsns_year: String(year),
        reprt_code: '11011',
        fs_div: 'CFS',
      });
    } catch {
      data = await dartGet('/fnlttSinglAcntAll.json', {
        corp_code: state.selectedCorp.corpCode,
        bsns_year: String(year),
        reprt_code: '11011',
        fs_div: 'OFS',
      });
    }
    state.financialData = data.list || [];
    renderFinancial(state.financialData, year);
  } catch(e) {
    if (year > 2015) {
      await fetchFinancial(year - 1);
    } else {
      showError('재무제표 조회 실패: ' + e.message);
    }
  }
}

function renderFinancial(list, year) {
  if (!list.length) {
    setContent('<div class="empty-state">재무제표 데이터가 없습니다.</div>');
    return;
  }
  const bs  = list.filter(r => r.sj_div === 'BS');
  const is_ = list.filter(r => r.sj_div === 'IS');
  const cf  = list.filter(r => r.sj_div === 'CF');
  const find = (arr, nm) => arr.find(r => r.account_nm && r.account_nm.includes(nm));
  const revenue    = find(is_, '매출') || find(is_, '영업수익') || is_[0];
  const opIncome   = find(is_, '영업이익');
  const netIncome  = find(is_, '당기순이익');
  const totalAsset = find(bs, '자산총계') || find(bs, '총자산');
  const equity     = find(bs, '자본총계') || find(bs, '총자본');
  const isCFS = list[0]?.fs_div === 'CFS';

  setContent(`
    <div class="info-banner" style="margin-bottom:20px">
      <div>
        <h3>${escHtml(state.selectedCorp.corpName)} ${year}년 재무제표</h3>
        <p>${isCFS ? '연결재무제표 (IFRS)' : '개별재무제표 (IFRS)'} &nbsp;·&nbsp; 단위: 원</p>
      </div>
      <button class="btn btn-sm btn-ghost" onclick="showYearPicker()">📅 연도 변경</button>
    </div>
    <div class="stat-grid">
      ${revenue    ? bigStatCard('매출액',     revenue.thstrm_amount,    revenue.frmtrm_amount)   : ''}
      ${opIncome   ? bigStatCard('영업이익',   opIncome.thstrm_amount,   opIncome.frmtrm_amount)  : ''}
      ${netIncome  ? bigStatCard('당기순이익', netIncome.thstrm_amount,  netIncome.frmtrm_amount) : ''}
      ${totalAsset ? bigStatCard('총자산',     totalAsset.thstrm_amount, null)                    : ''}
      ${equity     ? bigStatCard('자본총계',   equity.thstrm_amount,     null)                    : ''}
    </div>
    ${renderFinTable('재무상태표 (Balance Sheet)', bs, year)}
    ${renderFinTable('손익계산서 (Income Statement)', is_, year)}
    ${cf.length ? renderFinTable('현금흐름표 (Cash Flow)', cf, year) : ''}
  `);
}

function renderFinTable(title, rows, year) {
  if (!rows.length) return '';
  const prev = year - 1;
  return `
    <div class="fin-section">
      <div class="fin-title">${title}</div>
      <table class="fin-table">
        <thead>
          <tr>
            <th>계정과목</th>
            <th>${year}년 (당기)</th>
            <th>${prev}년 (전기)</th>
            <th>증감</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => {
            const cur  = parseNum(r.thstrm_amount);
            const prv  = parseNum(r.frmtrm_amount);
            const diff = (cur !== null && prv !== null) ? cur - prv : null;
            const pct  = (diff !== null && prv && prv !== 0) ? (diff/Math.abs(prv)*100).toFixed(1) : null;
            const isGroup = (r.account_id && r.account_id.endsWith('0')) || r.indent_level === '0';
            return `
              <tr class="${isGroup ? 'group-header' : ''}">
                <td style="padding-left:${isGroup ? '14' : '28'}px">${escHtml(r.account_nm || '')}</td>
                <td>${fmtMoney(r.thstrm_amount)}</td>
                <td>${fmtMoney(r.frmtrm_amount)}</td>
                <td class="${diff===null?'':diff>=0?'val-pos':'val-neg'}">
                  ${diff !== null ? (diff >= 0 ? '+' : '') + fmtMoney(String(diff)) : '-'}
                  ${pct !== null ? `<span style="font-size:10px;opacity:0.7"> (${diff>=0?'+':''}${pct}%)</span>` : ''}
                </td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

async function showYearPicker() {
  const year = prompt('조회할 연도 (예: 2023)', String(new Date().getFullYear()-1));
  if (!year) return;
  showLoading();
  await fetchFinancial(parseInt(year));
}

// ── Helpers ──
function parseNum(s) {
  if (!s) return null;
  const n = parseInt(s.replace(/,/g,'').replace(/\s/g,''));
  return isNaN(n) ? null : n;
}
function fmtMoney(s) {
  if (!s) return '-';
  const n = parseNum(s);
  if (n === null) return s;
  return n.toLocaleString('ko-KR');
}
function fmtDate(s) {
  if (!s || s.length < 8) return s || '';
  return s.slice(0,4) + '.' + s.slice(4,6) + '.' + s.slice(6,8);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function statCard(label, value, unit) {
  return `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-value" style="font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:600">${escHtml(value)}<span class="stat-unit">${unit}</span></div>
  </div>`;
}
function bigStatCard(label, cur, prev) {
  const cn = parseNum(cur), pn = parseNum(prev);
  let change = '';
  if (cn !== null && pn !== null && pn !== 0) {
    const pct = ((cn - pn) / Math.abs(pn) * 100).toFixed(1);
    const color = cn >= pn ? 'var(--green)' : 'var(--red)';
    change = `<div class="stat-change" style="color:${color}">${cn>=pn?'▲':'▼'} ${Math.abs(pct)}% YoY</div>`;
  }
  const v = cn !== null ? (Math.abs(cn) >= 1e12 ? (cn/1e12).toFixed(2)+'조' : Math.abs(cn) >= 1e8 ? Math.round(cn/1e8)+'억' : cn.toLocaleString()) : '-';
  return `<div class="stat-card">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${v}</div>
    ${change}
  </div>`;
}
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'financial' && state.selectedCorp && !state.financialData) loadFinancial();
  else if (tab === 'disclosures' && state.selectedCorp && !state.disclosures.length) searchDisclosures();
  else if (tab === 'overview' && state.selectedCorp) loadCorpInfo(state.selectedCorp.corpCode);
}
function setContent(html) { document.getElementById('mainContent').innerHTML = html; }
function showLoading() { setContent('<div class="loading"><div class="spinner"></div> 데이터 조회 중…</div>'); }
function showError(msg) { setContent(`<div class="error-box">❌ ${escHtml(msg)}</div>`); }
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1f2438;border:1px solid #2a3050;border-radius:8px;padding:12px 18px;font-size:13px;color:#e8ecf4;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
</script>
